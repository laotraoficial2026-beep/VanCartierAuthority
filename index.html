<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Van Cartier Authority | Global Strategic Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #00FF41; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #f0f0f0; font-family: 'Inter', sans-serif; overflow: hidden; }

        .hero { position: relative; height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Video Background */
        video { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%); opacity: 0.4; z-index: 1; filter: grayscale(1) brightness(0.8); }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, var(--bg) 100%); z-index: 2; }

        .content { z-index: 3; text-align: center; width: 100%; padding: 20px; animation: fadeIn 2s ease; }
        
        h1 { font-size: clamp(2rem, 10vw, 4.5rem); letter-spacing: 18px; color: var(--emerald); text-shadow: 0 0 30px var(--emerald); margin-bottom: 5px; font-weight: 700; }
        .tagline { letter-spacing: 8px; color: #666; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 40px; }

        /* Botones de Navegación */
        .nav-cluster { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 18px 35px; border: 1px solid var(--emerald); color: var(--emerald);
            text-decoration: none; letter-spacing: 4px; font-size: 0.7rem; font-weight: bold;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(0,0,0,0.6);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); text-transform: uppercase;
        }
        .btn:hover { background: var(--emerald); color: #000; box-shadow: 0 0 40px var(--emerald); transform: scale(1.05); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <section class="hero">
        <video autoplay loop muted playsinline>
            <source src="vancartier_video.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <div class="content">
            <h1>VAN CARTIER</h1>
            <p class="tagline">Strategic Authority & Intelligence</p>
            <nav class="nav-cluster">
                <a href="manifiesto.html" class="btn">Manifiesto</a>
                <a href="dossier-01.html" class="btn">Dossier 01</a>
                <a href="mailto:vancartierauthority@proton.me" class="btn">Contacto</a>
            </nav>
        </div>
    </section>
</body>
</html>
