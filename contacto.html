<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | VVC Secure Accces</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #0f0; --dark-bg: #000; --terminal-gray: #1a1a1a; }
        body { background: var(--dark-bg); color: var(--neon-green); font-family: 'Courier Prime', monospace; margin: 0; text-align: center; text-shadow: 0 0 5px rgba(0, 255, 0, 0.7); }
        
        /* Header Reducido con Video y Malla */
        .video-header-small { position: relative; height: 40vh; width: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; border-bottom: 2px solid var(--neon-green); }
        video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); z-index: -2; filter: brightness(15%) grayscale(100%); }
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(0deg, transparent 24%, rgba(0, 255, 0, .05) 25%, rgba(0, 255, 0, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, .05) 75%, rgba(0, 255, 0, .05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(0, 255, 0, .05) 25%, rgba(0, 255, 0, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, .05) 75%, rgba(0, 255, 0, .05) 76%, transparent 77%, transparent); background-size: 30px 30px; z-index: -1; }

        h1 { font-size: 2.5rem; text-transform: uppercase; margin: 0; letter-spacing: -1px; color: #fff; }
        .btn { padding: 8px 15px; border: 1px solid var(--neon-green); color: var(--neon-green); text-decoration: none; font-size: 0.7rem; background: rgba(0, 0, 0, 0.7); }
        .btn:hover { background: var(--neon-green); color: var(--dark-bg); }

        .content { padding: 80px 20px; max-width: 600px; margin: auto; }
        .terminal-box { border: 1px solid var(--neon-green); background: #080808; padding: 40px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        .terminal-header { color: #fff; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px; margin-bottom: 30px; opacity: 0.7; }
        .secure-mail { color: #fff; font-size: 1.1rem; border: 1px dashed var(--neon-green); padding: 15px; display: inline-block; background: #000; margin-top: 20px;}
    </style>
</head>
<body>
<div class="video-header-small">
    <video autoplay muted loop playsinline><source src="./vancartier_video.mp4" type="video/mp4"></video>
    <div class="grid-overlay"></div>
    <div style="z-index:1;">
        <h1>> SOLICITUD DE ACCESO</h1>
        <a href="./index.html" class="btn">Volver al Inicio</a>
    </div>
</div>
<section class="content">
    <div class="terminal-box">
        <div class="terminal-header">sys@vvc:~/$ send_request.sh</div>
        <p>> Protocolo de Solicitud Directa activado.</p>
        <p>> No se reconocen solicitudes de intermediarios sin folio ID-AD verificado.</p>
        <div class="secure-mail">contacto@vladimirvancartier.com</div>
    </div>
</section>
</body>
</html>
