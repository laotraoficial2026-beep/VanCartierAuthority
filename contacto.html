<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Directo | Van Cartier Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #00FF41; --bg: #050505; --input-bg: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #ccc; font-family: 'Inter', sans-serif; line-height: 1.6; }
        
        .container { max-width: 600px; margin: 80px auto; padding: 40px; border: 1px solid rgba(0, 255, 65, 0.2); background: rgba(0,0,0,0.8); box-shadow: 0 0 40px rgba(0, 255, 65, 0.1); }
        .back-btn { display: inline-block; margin-bottom: 30px; color: var(--emerald); text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; }
        
        h1 { color: var(--emerald); letter-spacing: 5px; font-size: 1.2rem; text-transform: uppercase; margin-bottom: 10px; }
        p { font-size: 0.85rem; color: #666; margin-bottom: 30px; letter-spacing: 1px; }

        form { display: flex; flex-direction: column; gap: 20px; }
        label { font-size: 0.7rem; color: var(--emerald); letter-spacing: 2px; text-transform: uppercase; }
        
        input, textarea {
            background: var(--input-bg); border: 1px solid #222; padding: 15px; color: #fff;
            font-family: 'Inter', sans-serif; transition: all 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--emerald); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }

        .submit-btn {
            background: transparent; border: 1px solid var(--emerald); color: var(--emerald);
            padding: 18px; cursor: pointer; font-weight: bold; letter-spacing: 4px;
            text-transform: uppercase; font-size: 0.8rem; transition: all 0.4s;
        }
        .submit-btn:hover { background: var(--emerald); color: #000; box-shadow: 0 0 30px var(--emerald); }

        footer { margin-top: 40px; font-size: 0.65rem; color: #444; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← CANCELAR ENLACE</a>
        <h1>ENLACE DE COMUNICACIÓN</h1>
        <p>Estableciendo canal directo con Van Cartier Authority.</p>

        <form action="https://formspree.io/f/TU_ID_AQUÍ" method="POST">
            <div>
                <label>Identidad / Organización</label><br>
                <input type="text" name="name" style="width: 100%;" required placeholder="Nombre o Entidad">
            </div>
            <div>
                <label>Canal de Respuesta</label><br>
                <input type="email" name="_replyto" style="width: 100%;" required placeholder="email@dominio.com">
            </div>
            <div>
                <label>Consulta / Requerimiento Técnico</label><br>
                <textarea name="message" rows="5" style="width: 100%;" required placeholder="Describa el escenario..."></textarea>
            </div>
            <button type="submit" class="submit-btn">ENVIAR PROTOCOLO</button>
        </form>

        <footer>
            CANAL CIFRADO - RESPUESTA SEGÚN PRIORIDAD ESTRATÉGICA
        </footer>
    </div>
</body>
</html>
