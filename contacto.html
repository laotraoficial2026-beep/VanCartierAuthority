<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Vladimir Van Cartier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --text: #e0e0e0; }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        .video-background { position: relative; height: 40vh; width: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; border-bottom: 1px solid var(--gold); }
        video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); z-index: -1; filter: brightness(30%); }
        .btn { padding: 8px 15px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-size: 0.7rem; text-transform: uppercase; background: rgba(0,0,0,0.5); }
        .content { padding: 40px 20px; max-width: 600px; margin: auto; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); }
        .contact-info { border: 1px solid var(--gold); padding: 30px; margin-top: 20px; }
        footer { padding: 40px; text-align: center; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline><source src="./nombre-de-tu-video.mp4" type="video/mp4"></video>
        <div style="z-index:1; text-align:center;">
            <h1>SOLICITUD</h1>
            <a href="./index.html" class="btn">Inicio</a>
        </div>
    </div>
    <section class="content">
        <div class="contact-info">
            <p>Vladimir Van Cartier no realiza prospección activa.</p>
            <p>Toda interacción se gestiona bajo el protocolo de <span style="color:var(--gold)">Solicitud Directa de Cliente Acreditado</span>.</p>
            <p><strong>Nota:</strong> No se reconoce autoridad a intermediarios sin folio ID-AD verificado.</p>
        </div>
    </section>
    <footer>Propiedad Intelectual Protegida | 2026</footer>
</body>
</html>
